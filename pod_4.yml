apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sdemo-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8sdemo

  template:
    metadata:
      labels:
        app: k8sdemo

    spec:
      containers:
        - name: k8sdemo
          image: newdelthis/k8sdemo:1.1
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: k8sdemo-service

spec:
  type: ClusterIP
  selector:
    app: k8sdemo
  ports:
    - port: 80
      targetPort: 8080
