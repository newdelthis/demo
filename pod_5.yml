apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sdemo-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8sdemo
  template:
    metadata:
      labels:
        app: k8sdemo
    spec:
      containers:
        - name: k8sdemo
          image: newdelthis/k8sdemo:1.1
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: k8sdemo-service
spec:
  type: NodePort      # 1. Changed from ClusterIP to NodePort
  selector:
    app: k8sdemo
  ports:
    - port: 80        # Internal cluster port
      targetPort: 8080 # Must match containerPort
      nodePort: 30080 # 2. Added a specific port for external access
