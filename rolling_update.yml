apiVersion: apps/v1
kind: Deployment

metadata:
  name: k8sdemo-deployment

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  minReadySeconds: 60

  selector:
    matchLabels:
      app: k8sdemo

  template:
    metadata:
      labels:
        app: k8sdemo

    spec:
      containers:
        - name: k8sdemo
          image: newdelthis/k8sdemo:1.1
          ports:
            - containerPort: 8080
